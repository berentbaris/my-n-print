    <!-- FAQ structured data (helps Google show rich snippets) -->

    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a nitrogen footprint?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your nitrogen footprint is the total amount of reactive nitrogen released into the environment each year as a result of your consumption. It is measured in kilograms of nitrogen per year (kg N/yr) and has two main components: food (growing, processing, and transporting what you eat, plus sewage) and energy (electricity, heating, driving, and flying)."
          }
        },
        {
          "@type": "Question",
          "name": "What is a good nitrogen footprint?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A good nitrogen footprint depends on where you live. Average footprints vary widely by country — from under 10 kg N/yr in many developing nations to over 30 kg N/yr in the United States. Use the calculator to compare your personal result against your country's average, and aim to bring yours below that benchmark."
          }
        },
        {
          "@type": "Question",
          "name": "How does food compare to energy in a nitrogen footprint?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For most people, food is the larger contributor to their nitrogen footprint, often accounting for 60–80% of the total. Meat and dairy production are especially nitrogen-intensive due to fertiliser use, animal feed, and manure. Energy (electricity, gas, transport) makes up the remainder, mainly through nitrogen oxide emissions from burning fossil fuels."
          }
        },
        {
          "@type": "Question",
          "name": "How can I reduce my nitrogen footprint?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The most effective ways to reduce your nitrogen footprint are: eating less meat and dairy (especially beef), reducing food waste, using public transport or cycling instead of driving, choosing renewable energy sources, and flying less. Even small changes in diet can make a significant difference since food production is the largest contributor for most people."
          }
        }
      ]
    }
    </script>
